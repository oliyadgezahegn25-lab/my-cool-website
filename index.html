<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labaid Trading PLC - Inventory & Sales System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-dark: #0f172a;
      --panel-bg: #1e293b;
      --border-light: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-cyan: #38bdf8;
      --accent-emerald: #10b981;
      --accent-amber: #f59e0b;
      --accent-purple: #a855f7;
      --accent-rose: #f43f5e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

    /* NAVBAR */
    .navbar {
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border-light);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .brand { font-size: 20px; font-weight: 800; color: var(--accent-cyan); display: flex; align-items: center; gap: 10px; }
    .nav-actions { display: flex; gap: 10px; align-items: center; }

    /* BUTTONS */
    .btn-action {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      color: var(--text-main);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    .btn-action:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
    .btn-primary { background: var(--accent-cyan); color: #020617; border: none; }
    .btn-primary:hover { background: #0284c7; color: #fff; }

    /* MAIN LAYOUT */
    .app-container { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 65px); }
    .sidebar { width: 360px; background: var(--panel-bg); border-right: 1px solid var(--border-light); padding: 20px; overflow-y: auto; }
    .content-area { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

    /* FORM STYLES */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
    .form-control {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 9px 12px;
      color: white;
      font-size: 13px;
    }
    .form-control:focus { outline: none; border-color: var(--accent-cyan); }

    /* TABS */
    .view-tabs { display: flex; gap: 10px; border-bottom: 1px solid var(--border-light); padding-bottom: 10px; }
    .tab-btn { background: none; border: none; color: var(--text-muted); padding: 8px 16px; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 6px; }
    .tab-btn.active { background: rgba(56, 189, 248, 0.15); color: var(--accent-cyan); }

    /* TABLE */
    .table-container { background: var(--panel-bg); border: 1px solid var(--border-light); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
    th { background: rgba(0, 0, 0, 0.3); padding: 12px 16px; color: var(--text-muted); font-weight: 600; }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border-light); }
    tr:hover { background: rgba(255, 255, 255, 0.02); }

    /* MODAL & DRAWERS */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 200;
    }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--panel-bg); border: 1px solid var(--border-light); border-radius: 12px; width: 100%; max-width: 500px; padding: 24px; max-height: 90vh; overflow-y: auto; }

    .side-drawer {
      position: fixed; top: 0; right: -420px; width: 400px; height: 100vh;
      background: var(--panel-bg); border-left: 1px solid var(--border-light);
      box-shadow: -5px 0 25px rgba(0,0,0,0.5); transition: right 0.3s ease; z-index: 150; padding: 20px; overflow-y: auto;
    }
    .side-drawer.open { right: 0; }

    /* MESSAGE STYLE SALES CARD */
    .sale-msg-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .sale-msg-card:hover { background: rgba(255, 255, 255, 0.07); border-color: var(--accent-emerald); }
    .sale-msg-body { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-light); font-size: 12px; color: var(--text-muted); }
    .sale-msg-card.expanded .sale-msg-body { display: block; }

    /* TOUR HIGHLIGHT */
    .tour-highlight {
      position: relative !important;
      z-index: 1000 !important;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.75), 0 0 15px var(--accent-cyan) !important;
      border-radius: 8px;
    }
    #tour-popover {
      position: fixed; z-index: 1001; background: var(--panel-bg); border: 2px solid var(--accent-cyan);
      border-radius: 12px; padding: 18px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); display: none;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="brand">
      <i class="fa-solid fa-boxes-stacked"></i> LABAID TRADING PLC
    </div>
    <div class="nav-actions">
      <button class="btn-action" id="tour-step-btn" style="background: rgba(245, 158, 11, 0.15); color: var(--accent-amber); border-color: var(--accent-amber);" onclick="startTourGuide()">
        <i class="fa-solid fa-compass"></i> Beginner Tour
      </button>
      <button class="btn-action" id="tour-sales-btn" onclick="toggleSalesDrawer()">
        <i class="fa-solid fa-receipt"></i> Sales History Menu
      </button>
      <button class="btn-action" id="tour-export-btn" onclick="openExportModal()">
        <i class="fa-solid fa-file-csv"></i> Export Data
      </button>
      <button class="btn-action" onclick="toggleAuditDrawer()">
        <i class="fa-solid fa-list-check"></i> Audit Logs
      </button>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <div class="app-container">
    
    <!-- LEFT SIDEBAR: REGISTRATION FORM -->
    <aside class="sidebar" id="tour-reg-form">
      <h3 style="margin-bottom: 15px; color: var(--accent-cyan);">
        <i class="fa-solid fa-plus-circle"></i> Item Registration
      </h3>
      
      <form id="enterprise-form" onsubmit="handleItemSubmit(event)">
        <div class="form-group">
          <label>Category</label>
          <select class="form-control" id="ent-category" onchange="toggleCategoryFields()" required>
            <option value="Laboratory Equipment">Laboratory Equipment</option>
            <option value="Educational & Lab Supplies">Educational & Lab Supplies</option>
            <option value="Electrical & Power Supplies">Electrical & Power Supplies</option>
            <option value="Agricultural Equipment">Agricultural Equipment</option>
            <option value="Industrial Machinery">Industrial Machinery</option>
            <option value="Chemicals & Reagents">Chemicals & Reagents</option>
          </select>
        </div>

        <div class="form-group">
          <label>Item Description / Name</label>
          <input type="text" class="form-control" id="ent-name" required placeholder="e.g. Digital Spectrophotometer">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group">
            <label>Brand</label>
            <input type="text" class="form-control" id="ent-brand" placeholder="e.g. Biobase">
          </div>
          <div class="form-group">
            <label>Model</label>
            <input type="text" class="form-control" id="ent-model" placeholder="e.g. BK-V1100">
          </div>
        </div>

        <div id="standard-spec-fields">
          <div class="form-group">
            <label>Upload Catalogue Spec PDF File</label>
            <input type="file" class="form-control" id="ent-pdf-file" accept=".pdf">
          </div>
          <div class="form-group">
            <label>OR Catalogue Spec URL</label>
            <input type="url" class="form-control" id="ent-catalog-url" placeholder="https://...">
          </div>
        </div>

        <div id="chem-special-fields" style="display: none;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group">
              <label>CAS Number</label>
              <input type="text" class="form-control" id="ent-cas" placeholder="7647-14-5">
            </div>
            <div class="form-group">
              <label>Expiry Date</label>
              <input type="date" class="form-control" id="ent-expire">
            </div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
          <div class="form-group">
            <label>Unit</label>
            <input type="text" class="form-control" id="ent-unit" placeholder="Pcs / Pack" required>
          </div>
          <div class="form-group">
            <label>Stock Qty</label>
            <input type="number" class="form-control" id="ent-qty" required min="0">
          </div>
          <div class="form-group">
            <label>Price (ETB)</label>
            <input type="number" step="0.01" class="form-control" id="ent-price" required min="0">
          </div>
        </div>

        <button type="submit" class="btn-action btn-primary" style="width: 100%; justify-content: center; margin-top: 10px; padding: 12px;">
          <i class="fa-solid fa-save"></i> Save Item to Inventory
        </button>
      </form>
    </aside>

    <!-- RIGHT CONTENT AREA -->
    <main class="content-area">
      <div class="view-tabs" id="tour-view-tabs">
        <button class="tab-btn active" id="tab-equipment" onclick="switchEnterpriseView('equipment')">
          <i class="fa-solid fa-microscope"></i> Equipment & Supplies
        </button>
        <button class="tab-btn" id="tab-chemicals" onclick="switchEnterpriseView('chemicals')">
          <i class="fa-solid fa-flask"></i> Chemicals & Reagents
        </button>
      </div>

      <div class="table-container" id="tour-table">
        <table>
          <thead id="ent-table-head"></thead>
          <tbody id="ent-table-body"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- EDIT ITEM MODAL -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal-box">
      <h3 style="color: var(--accent-amber); margin-bottom: 15px;"><i class="fa-solid fa-pen-to-square"></i> Edit Inventory Item</h3>
      <form id="edit-form" onsubmit="handleEditSubmit(event)">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label>Category</label>
          <select class="form-control" id="edit-category">
            <option value="Laboratory Equipment">Laboratory Equipment</option>
            <option value="Educational & Lab Supplies">Educational & Lab Supplies</option>
            <option value="Electrical & Power Supplies">Electrical & Power Supplies</option>
            <option value="Agricultural Equipment">Agricultural Equipment</option>
            <option value="Industrial Machinery">Industrial Machinery</option>
            <option value="Chemicals & Reagents">Chemicals & Reagents</option>
          </select>
        </div>
        <div class="form-group">
          <label>Item Name / Description</label>
          <input type="text" class="form-control" id="edit-name" required>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group"><label>Brand</label><input type="text" class="form-control" id="edit-brand"></div>
          <div class="form-group"><label>Model</label><input type="text" class="form-control" id="edit-model"></div>
        </div>
        <div class="form-group"><label>Update Spec PDF File</label><input type="file" class="form-control" id="edit-pdf-file" accept=".pdf"></div>
        <div class="form-group"><label>OR Spec URL</label><input type="url" class="form-control" id="edit-catalog"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group"><label>Stock Quantity</label><input type="number" class="form-control" id="edit-qty" required></div>
          <div class="form-group"><label>Unit Selling Price (ETB)</label><input type="number" step="0.01" class="form-control" id="edit-price" required></div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button type="button" class="btn-action" style="flex:1; justify-content: center;" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn-action" style="flex:1; justify-content: center; background: var(--accent-amber); color: #020617;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- RECORD SALE MODAL -->
  <div class="modal-overlay" id="sale-modal">
    <div class="modal-box">
      <h3 style="color: var(--accent-emerald); margin-bottom: 15px;"><i class="fa-solid fa-cart-shopping"></i> Process Item Sale / Transfer</h3>
      <div id="sale-item-summary" style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px;"></div>

      <form id="sale-form" onsubmit="handleSaleSubmit(event)">
        <input type="hidden" id="sale-item-id">
        <input type="hidden" id="sale-item-name">
        <div class="form-group">
          <label>Sale Type / Agreement</label>
          <select class="form-control" id="sale-type" onchange="toggleSaleTypeMode()">
            <option value="Cash / Paid">Standard / Cash Sale</option>
            <option value="Sample">Sample Item (Free/Demo)</option>
            <option value="Credit">Credit Sale (Pending Payment)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Where Sold / Client & Destination Name</label>
          <input type="text" class="form-control" id="sale-client" placeholder="e.g. Bule Hora University" required>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group"><label>Quantity Sold</label><input type="number" class="form-control" id="sale-qty" min="1" required oninput="calculateSaleTotal()"></div>
          <div class="form-group"><label>Selling Price / Unit (ETB)</label><input type="number" step="0.01" class="form-control" id="sale-unit-price" required oninput="calculateSaleTotal()"></div>
        </div>
        <div class="form-group"><label>Transaction Date</label><input type="date" class="form-control" id="sale-date" required></div>
        <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent-emerald); border-radius: 10px; padding: 12px; text-align: center; margin-bottom: 15px;">
          <div style="font-size: 11px; color: var(--text-muted);">TOTAL TRANSACTION VALUE</div>
          <div style="font-size: 20px; font-weight: 800; color: var(--accent-emerald);" id="sale-total-display">0.00 ETB</div>
        </div>
        <div style="display: flex; gap: 10px;">
          <button type="button" class="btn-action" style="flex:1; justify-content: center;" onclick="closeSaleModal()">Cancel</button>
          <button type="submit" class="btn-action" style="flex:1; justify-content: center; background: var(--accent-emerald); color: #020617;">Confirm Transaction</button>
        </div>
      </form>
    </div>
  </div>

  <!-- EXPORT MODAL -->
  <div class="modal-overlay" id="export-modal">
    <div class="modal-box">
      <h3 style="color: var(--accent-cyan); margin-bottom: 10px;"><i class="fa-solid fa-file-csv"></i> Export Data Center</h3>
      <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">Download custom CSV spreadsheets for inventory or past sales records.</p>
      <div class="form-group">
        <label>Export Target Dataset</label>
        <select class="form-control" id="export-target">
          <option value="inventory">Entire Inventory Directory</option>
          <option value="sales">Past Sales History</option>
        </select>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="btn-action" style="flex:1; justify-content: center;" onclick="closeExportModal()">Cancel</button>
        <button class="btn-action" style="flex:1; justify-content: center; background: var(--accent-cyan); color: #020617;" onclick="processExportRequest()">Download CSV Report</button>
      </div>
    </div>
  </div>

  <!-- TOUR POPOVER CARD -->
  <div id="tour-popover">
    <h4 id="tour-title" style="color:var(--accent-cyan); margin-bottom:8px; font-size: 15px;">Step Title</h4>
    <p id="tour-desc" style="font-size:12px; color:var(--text-main); margin-bottom:15px; line-height: 1.4;">Step description goes here.</p>
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span id="tour-progress" style="font-size:11px; color:var(--text-muted);">Step 1 of 5</span>
      <div style="display:flex; gap:6px;">
        <button class="btn-action" style="padding:4px 8px; font-size:11px;" onclick="endTour()">End Tour</button>
        <button class="btn-action btn-primary" id="tour-next-btn" style="padding:4px 10px; font-size:11px;" onclick="nextTourStep()">Next</button>
      </div>
    </div>
  </div>

  <!-- AUDIT LOG DRAWER -->
  <div id="audit-drawer" class="side-drawer">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-light); padding-bottom: 15px;">
      <h3 style="margin: 0; color: var(--accent-purple); font-size: 18px;"><i class="fa-solid fa-list-check"></i> Audit Logs</h3>
      <button onclick="toggleAuditDrawer()" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">&times;</button>
    </div>
    <div id="audit-log-container"></div>
  </div>

  <!-- SALES HISTORY DRAWER -->
  <div id="sales-drawer" class="side-drawer">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-light); padding-bottom: 12px;">
      <h3 style="margin: 0; color: var(--accent-emerald); font-size: 18px;"><i class="fa-solid fa-receipt"></i> Sales History</h3>
      <button onclick="toggleSalesDrawer()" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">&times;</button>
    </div>
    
    <!-- TIME FILTER BUTTONS -->
    <div style="display: flex; gap: 6px; margin-bottom: 15px;">
      <button class="btn-action" id="filter-week" style="flex:1; justify-content:center; padding:6px; font-size:11px;" onclick="setSalesFilter('week')">This Week</button>
      <button class="btn-action" id="filter-month" style="flex:1; justify-content:center; padding:6px; font-size:11px;" onclick="setSalesFilter('month')">This Month</button>
      <button class="btn-action" id="filter-year" style="flex:1; justify-content:center; padding:6px; font-size:11px;" onclick="setSalesFilter('year')">This Year</button>
      <button class="btn-action active-filter" id="filter-all" style="flex:1; justify-content:center; padding:6px; font-size:11px; background:rgba(56,189,248,0.2); color:var(--accent-cyan);" onclick="setSalesFilter('all')">All Time</button>
    </div>

    <div id="sales-history-container"></div>
  </div>

  <!-- JAVASCRIPT LOGIC ENGINE -->
  <script>
    const SUPABASE_URL = "https://cbmvbbfbgauqusibdnup.supabase.co";
    const SUPABASE_KEY = "sb_publishable_gq0-KFzH8Ru9-etDSZ_Cwg_pQrHCYcY";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let enterpriseItems = [];
    let salesHistory = [];
    let auditLogs = [];
    let currentView = 'equipment';
    let currentSalesFilter = 'all';

    window.addEventListener('DOMContentLoaded', () => {
      addAuditEntry("System Session", "Dashboard loaded.");
      loadEnterpriseData();
    });

    function formatCurrency(val) {
      return (parseFloat(val) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " ETB";
    }

    function addAuditEntry(action, details) {
      auditLogs.unshift({ time: new Date().toLocaleTimeString(), action, details });
      renderAuditLogs();
    }

    function renderAuditLogs() {
      const container = document.getElementById('audit-log-container');
      if (!auditLogs.length) {
        container.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px;">No actions logged.</div>`;
        return;
      }
      container.innerHTML = auditLogs.map(log => `
        <div style="background: rgba(255,255,255,0.04); border: 1px solid var(--border-light); border-radius: 10px; padding: 10px; margin-bottom: 10px;">
          <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); margin-bottom: 4px;">
            <span style="color:var(--accent-purple); font-weight:700;">${log.action}</span>
            <span>${log.time}</span>
          </div>
          <div style="font-size:12px; color:var(--text-main);">${log.details}</div>
        </div>
      `).join('');
    }

    async function loadEnterpriseData() {
      const { data: itemsData } = await db.from('items').select('*').order('id', { ascending: false });
      enterpriseItems = itemsData || [];

      // Fetch from Supabase, merge with local storage fallback if table schema fails
      let salesData = [];
      try {
        const res = await db.from('sales_log').select('*').order('id', { ascending: false });
        salesData = res.data || [];
      } catch (err) {
        salesData = [];
      }

      const localSales = JSON.parse(localStorage.getItem('local_sales_fallback') || '[]');
      salesHistory = [...localSales, ...salesData];

      renderEnterpriseTable(enterpriseItems);
      renderSalesHistoryDrawer();
    }

    function toggleCategoryFields() {
      const cat = document.getElementById('ent-category').value;
      const isChem = cat === "Chemicals & Reagents";
      document.getElementById('chem-special-fields').style.display = isChem ? 'block' : 'none';
      document.getElementById('standard-spec-fields').style.display = isChem ? 'none' : 'block';
    }

    function switchEnterpriseView(mode) {
      currentView = mode;
      document.getElementById('tab-equipment').classList.toggle('active', mode === 'equipment');
      document.getElementById('tab-chemicals').classList.toggle('active', mode === 'chemicals');
      renderEnterpriseTable(enterpriseItems);
    }

    function renderEnterpriseTable(items) {
      const thead = document.getElementById('ent-table-head');
      const tbody = document.getElementById('ent-table-body');

      const filtered = items.filter(item => {
        const isChem = item.category === "Chemicals & Reagents";
        return currentView === 'chemicals' ? isChem : !isChem;
      });

      if (currentView === 'chemicals') {
        thead.innerHTML = `<tr><th>#</th><th>Chemical Name</th><th>Category</th><th>CAS Number</th><th>Stock Qty</th><th>Unit Price</th><th>Expiry</th><th>Actions</th></tr>`;
      } else {
        thead.innerHTML = `<tr><th>#</th><th>Item / Specification</th><th>Category</th><th>Brand & Model</th><th>Stock Qty</th><th>Unit Price</th><th>Catalogue Spec</th><th>Actions</th></tr>`;
      }

      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color: var(--text-muted);">No records found.</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map((item, index) => {
        const qty = parseInt(item.quantity) || 0;
        const pdfUrl = item.pdf_url;
        const rowNum = index + 1;

        if (currentView === 'chemicals') {
          return `
            <tr>
              <td><strong>${rowNum}</strong></td>
              <td><strong>${item.item_name}</strong></td>
              <td><span style="font-size:11px; padding:3px 8px; background:rgba(255,255,255,0.06); border-radius:6px;">${item.category}</span></td>
              <td><span style="font-size:12px; font-family:monospace; color:var(--accent-purple);">${item.cas_number || 'N/A'}</span></td>
              <td><strong>${qty}</strong> ${item.unit_of_measure || ''}</td>
              <td><strong style="color:var(--accent-cyan);">${formatCurrency(item.price)}</strong></td>
              <td><span style="font-size:12px; color:var(--accent-amber);">${item.expire_date || 'N/A'}</span></td>
              <td>
                <div style="display:flex; gap:6px;">
                  <button class="btn-action" style="padding:4px 8px; font-size:11px; background:var(--accent-amber); color:#020617;" onclick="openEditModal(${item.id})"><i class="fa-solid fa-pen"></i></button>
                  <button class="btn-action" style="padding:4px 8px; font-size:11px; background:var(--accent-emerald); color:#020617;" onclick="openSaleModal(${item.id})" ${qty <= 0 ? 'disabled' : ''}><i class="fa-solid fa-cart-shopping"></i></button>
                </div>
              </td>
            </tr>`;
        } else {
          return `
            <tr>
              <td><strong>${rowNum}</strong></td>
              <td><strong>${item.item_name}</strong></td>
              <td><span style="font-size:11px; padding:3px 8px; background:rgba(255,255,255,0.06); border-radius:6px;">${item.category}</span></td>
              <td><div style="font-size:12px;">${item.brand || '-'} / ${item.model || '-'}</div></td>
              <td><strong>${qty}</strong> ${item.unit_of_measure || ''}</td>
              <td><strong style="color:var(--accent-cyan);">${formatCurrency(item.price)}</strong></td>
              <td>${pdfUrl ? `<a href="${pdfUrl}" target="_blank" class="btn-action" style="padding:4px 8px; font-size:11px;"><i class="fa-solid fa-file-pdf"></i> PDF</a>` : `<span style="font-size:11px; color:var(--text-muted);">None</span>`}</td>
              <td>
                <div style="display:flex; gap:6px;">
                  <button class="btn-action" style="padding:4px 8px; font-size:11px; background:var(--accent-amber); color:#020617;" onclick="openEditModal(${item.id})"><i class="fa-solid fa-pen"></i></button>
                  <button class="btn-action" style="padding:4px 8px; font-size:11px; background:var(--accent-emerald); color:#020617;" onclick="openSaleModal(${item.id})" ${qty <= 0 ? 'disabled' : ''}><i class="fa-solid fa-cart-shopping"></i></button>
                </div>
              </td>
            </tr>`;
        }
      }).join('');
    }

    function convertFileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    async function handleItemSubmit(e) {
      e.preventDefault();
      const pdfFileInput = document.getElementById('ent-pdf-file');
      let catalogUrl = document.getElementById('ent-catalog-url').value;
      if (pdfFileInput && pdfFileInput.files.length > 0) {
        catalogUrl = await convertFileToBase64(pdfFileInput.files[0]);
      }

      const basePayload = {
        category: document.getElementById('ent-category').value,
        item_name: document.getElementById('ent-name').value,
        brand: document.getElementById('ent-brand').value,
        model: document.getElementById('ent-model').value,
        pdf_url: catalogUrl,
        unit_of_measure: document.getElementById('ent-unit').value,
        quantity: parseInt(document.getElementById('ent-qty').value) || 0,
        price: parseFloat(document.getElementById('ent-price').value) || 0
      };

      let { error } = await db.from('items').insert([{
        ...basePayload,
        cas_number: document.getElementById('ent-cas').value || null,
        expire_date: document.getElementById('ent-expire').value || null
      }]);

      if (error) {
        await db.from('items').insert([basePayload]);
      }

      addAuditEntry("Item Registered", `Added "${basePayload.item_name}"`);
      document.getElementById('enterprise-form').reset();
      loadEnterpriseData();
    }

    function openEditModal(id) {
      const item = enterpriseItems.find(i => i.id === id);
      if (!item) return;
      document.getElementById('edit-id').value = item.id;
      document.getElementById('edit-category').value = item.category;
      document.getElementById('edit-name').value = item.item_name;
      document.getElementById('edit-brand').value = item.brand || '';
      document.getElementById('edit-model').value = item.model || '';
      document.getElementById('edit-catalog').value = item.pdf_url || '';
      document.getElementById('edit-qty').value = item.quantity;
      document.getElementById('edit-price').value = item.price;
      document.getElementById('edit-modal').classList.add('active');
    }

    function closeEditModal() { document.getElementById('edit-modal').classList.remove('active'); }

    async function handleEditSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const pdfFileInput = document.getElementById('edit-pdf-file');
      let catalogUrl = document.getElementById('edit-catalog').value;
      if (pdfFileInput && pdfFileInput.files.length > 0) {
        catalogUrl = await convertFileToBase64(pdfFileInput.files[0]);
      }
      const updated = {
        category: document.getElementById('edit-category').value,
        item_name: document.getElementById('edit-name').value,
        brand: document.getElementById('edit-brand').value,
        model: document.getElementById('edit-model').value,
        pdf_url: catalogUrl,
        quantity: parseInt(document.getElementById('edit-qty').value) || 0,
        price: parseFloat(document.getElementById('edit-price').value) || 0
      };
      await db.from('items').update(updated).eq('id', id);
      closeEditModal(); 
      loadEnterpriseData();
    }

    function openSaleModal(id) {
      const item = enterpriseItems.find(i => i.id === id);
      if (!item) return;
      document.getElementById('sale-item-id').value = item.id;
      document.getElementById('sale-item-name').value = item.item_name;
      document.getElementById('sale-item-summary').innerHTML = `<strong>${item.item_name}</strong> | Available Stock: <span style="color:var(--accent-cyan);">${item.quantity} ${item.unit_of_measure || ''}</span>`;
      document.getElementById('sale-unit-price').value = item.price;
      document.getElementById('sale-qty').value = 1;
      document.getElementById('sale-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('sale-type').value = "Cash / Paid";
      calculateSaleTotal();
      document.getElementById('sale-modal').classList.add('active');
    }

    function closeSaleModal() { document.getElementById('sale-modal').classList.remove('active'); }
    function toggleSaleTypeMode() {
      if (document.getElementById('sale-type').value === 'Sample') document.getElementById('sale-unit-price').value = 0;
      calculateSaleTotal();
    }
    function calculateSaleTotal() {
      const qty = parseFloat(document.getElementById('sale-qty').value) || 0;
      const unitPrice = parseFloat(document.getElementById('sale-unit-price').value) || 0;
      document.getElementById('sale-total-display').innerText = formatCurrency(qty * unitPrice);
    }

    /* BULLETPROOF TRANSACTION PROCESSOR WITH ROBUST FALLBACK */
    async function handleSaleSubmit(e) {
      e.preventDefault();
      const itemId = document.getElementById('sale-item-id').value;
      const itemName = document.getElementById('sale-item-name').value;
      const client = document.getElementById('sale-client').value;
      const saleType = document.getElementById('sale-type').value;
      const qtySold = parseInt(document.getElementById('sale-qty').value) || 0;
      const unitPrice = parseFloat(document.getElementById('sale-unit-price').value) || 0;
      const saleDate = document.getElementById('sale-date').value;
      const totalVal = qtySold * unitPrice;

      const item = enterpriseItems.find(i => i.id == itemId);
      if (item && item.quantity < qtySold) {
        alert("Insufficient stock available!");
        return;
      }

      const payload = {
        item_id: itemId,
        item_name: itemName,
        sale_type: saleType,
        destination: client,
        quantity_sold: qtySold,
        unit_price: unitPrice,
        total_price: totalVal,
        sale_date: saleDate
      };

      // Try saving to Supabase, but if schema cache blocks it, save locally instantly
      let { error } = await db.from('sales_log').insert([payload]);
      if (error) {
        const localSales = JSON.parse(localStorage.getItem('local_sales_fallback') || '[]');
        localSales.unshift({ ...payload, id: 'local_' + Date.now() });
        localStorage.setItem('local_sales_fallback', JSON.stringify(localSales));
      }

      if (item) {
        const newQty = item.quantity - qtySold;
        await db.from('items').update({ quantity: newQty }).eq('id', itemId);
      }

      addAuditEntry("Sale Processed", `Sold ${qtySold} x "${itemName}" to ${client}`);
      closeSaleModal();
      loadEnterpriseData();
      toggleSalesDrawer();
    }

    function toggleSalesDrawer() { document.getElementById('sales-drawer').classList.toggle('open'); }
    function toggleAuditDrawer() { document.getElementById('audit-drawer').classList.toggle('open'); }

    function setSalesFilter(filter) {
      currentSalesFilter = filter;
      ['week', 'month', 'year', 'all'].forEach(f => {
        const btn = document.getElementById(`filter-${f}`);
        if (f === filter) {
          btn.style.background = 'rgba(56,189,248,0.2)';
          btn.style.color = 'var(--accent-cyan)';
        } else {
          btn.style.background = 'rgba(255,255,255,0.05)';
          btn.style.color = 'var(--text-main)';
        }
      });
      renderSalesHistoryDrawer();
    }

    function renderSalesHistoryDrawer() {
      const container = document.getElementById('sales-history-container');
      const now = new Date();

      const filteredSales = salesHistory.filter(sale => {
        const sDate = new Date(sale.sale_date || sale.created_at || now);
        if (currentSalesFilter === 'week') {
          const oneWeekAgo = new Date();
          oneWeekAgo.setDate(now.getDate() - 7);
          return sDate >= oneWeekAgo;
        } else if (currentSalesFilter === 'month') {
          return sDate.getMonth() === now.getMonth() && sDate.getFullYear() === now.getFullYear();
        } else if (currentSalesFilter === 'year') {
          return sDate.getFullYear() === now.getFullYear();
        }
        return true;
      });

      if (!filteredSales.length) {
        container.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:20px;">No sales records found for this timeframe.</div>`;
        return;
      }

      container.innerHTML = filteredSales.map((sale) => `
        <div class="sale-msg-card" onclick="this.classList.toggle('expanded')">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <strong style="color:var(--text-main); font-size:13px;"><i class="fa-solid fa-comment-dots" style="color:var(--accent-emerald); margin-right:5px;"></i> ${sale.item_name || 'Item Sale'}</strong>
            <span style="font-size:11px; padding:2px 6px; background:rgba(16,185,129,0.15); color:var(--accent-emerald); border-radius:4px;">${sale.sale_type || 'Paid'}</span>
          </div>
          <div style="font-size:12px; color:var(--text-muted); margin-top:4px;">Client: <span style="color:white;">${sale.destination || 'N/A'}</span></div>
          <div style="display:flex; justify-content:space-between; margin-top:8px; font-size:11px; color:var(--text-muted);">
            <span>${sale.sale_date || 'Recent'}</span>
            <strong style="color:var(--accent-cyan);">${formatCurrency(sale.total_price)}</strong>
          </div>
          <div class="sale-msg-body">
            <div><strong>Detailed Retail Breakdown:</strong></div>
            <div>Quantity Sold: ${sale.quantity_sold || 1} Pcs</div>
            <div>Unit Price: ${formatCurrency(sale.unit_price)}</div>
            <div>Destination / Client: ${sale.destination || 'Direct Client'}</div>
            <div style="color: var(--accent-cyan); margin-top: 4px; font-style: italic;">Tap card to collapse message view</div>
          </div>
        </div>
      `).join('');
    }

    function openExportModal() { document.getElementById('export-modal').classList.add('active'); }
    function closeExportModal() { document.getElementById('export-modal').classList.remove('active'); }

    function processExportRequest() {
      const target = document.getElementById('export-target').value;
      if (target === 'inventory') {
        exportCSV(enterpriseItems, "Inventory_Report.csv");
      } else {
        exportCSV(salesHistory, "Sales_History_Report.csv");
      }
      closeExportModal();
    }

    function exportCSV(data, filename) {
      if (!data || !data.length) { alert("No data available to export!"); return; }
      const keys = Object.keys(data[0]);
      const csvContent = [
        keys.join(','),
        ...data.map(row => keys.map(k => `"${(row[k] || '').toString().replace(/"/g, '""')}"`).join(','))
      ].join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
    }

    let tourStep = 0;
    const tourSteps = [
      { elementId: 'tour-reg-form', title: '1. Register Inventory & Chemicals', desc: 'Enter product parameters and toggle category forms.' },
      { elementId: 'tour-view-tabs', title: '2. Directory Category Switcher', desc: 'Filter between standard equipment and chemical supplies.' },
      { elementId: 'tour-table', title: '3. Inventory Directory Table', desc: 'Manage stock levels, pricing, and PDF specifications.' },
      { elementId: 'tour-sales-btn', title: '4. Sales History Menu', desc: 'Filter past sales by week/month/year and click message cards for details.' },
      { elementId: 'tour-export-btn', title: '5. Export Data Center', desc: 'Download CSV spreadsheets for inventories or historical sales.' }
    ];

    function startTourGuide() { 
      tourStep = 0; 
      renderTourStep(); 
    }

    function renderTourStep() {
      document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
      if (tourStep >= tourSteps.length) { 
        endTour(); 
        return; 
      }
      const step = tourSteps[tourStep];
      const targetEl = document.getElementById(step.elementId) || document.querySelector(step.elementId);
      if (!targetEl) { 
        tourStep++;
        renderTourStep(); 
        return; 
      }
      targetEl.classList.add('tour-highlight');
      const rect = targetEl.getBoundingClientRect();
      const popover = document.getElementById('tour-popover');
      document.getElementById('tour-title').innerText = step.title;
      document.getElementById('tour-desc').innerText = step.desc;
      document.getElementById('tour-progress').innerText = `Step ${tourStep + 1} of ${tourSteps.length}`;
      
      const nextBtn = document.getElementById('tour-next-btn');
      if (tourStep === tourSteps.length - 1) {
        nextBtn.innerText = 'Finish';
      } else {
        nextBtn.innerText = 'Next';
      }

      popover.style.display = 'block';
      popover.style.top = `${Math.max(10, rect.bottom + 10)}px`;
      popover.style.left = `${Math.max(10, Math.min(window.innerWidth - 340, rect.left))}px`;
    }

    function nextTourStep() { 
      tourStep++; 
      renderTourStep(); 
    }

    function endTour() {
      document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
      document.getElementById('tour-popover').style.display = 'none';
      tourStep = 0;
    }
  </script>
</body>
