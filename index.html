<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labaid Trading PLC - Laboratory & Educational Supplies Portal</title>
  
  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
        --primary:#020617;
        --accent:#06b6d4;
        --purple:#a855f7;
        --bg:#020617;
        --card:rgba(255,255,255,0.08);
        --text:#e2e8f0;
        --border:rgba(255,255,255,0.15);
    }

    *{
        box-sizing:border-box;
    }

    body {
        font-family: 'Times New Roman', Times, serif;
        margin:0;
        min-height:100vh;
        color:white;
        background:
        radial-gradient(circle at top left,#1e1b4b,transparent 40%),
        radial-gradient(circle at bottom right,#0f766e,transparent 35%),
        #020617;
        overflow-x:hidden;
    }

    /* floating lights */
    body::before,
    body::after {
        content:"";
        position:fixed;
        width:350px;
        height:350px;
        border-radius:50%;
        filter:blur(100px);
        opacity:.5;
        z-index:-1;
    }

    body::before {
        background:#06b6d4;
        top:10%;
        left:5%;
    }

    body::after {
        background:#a855f7;
        bottom:10%;
        right:5%;
    }

    /* HEADER */
    header {
        padding:25px 8%;
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:rgba(255,255,255,.08);
        backdrop-filter:blur(15px);
        border-bottom:1px solid var(--border);
        box-shadow:0 10px 30px rgba(0,0,0,.3);
    }

    header h1 {
        margin:0;
        font-size:30px;
        letter-spacing:-0.5px;
    }

    header h1 span {
        margin-left:10px;
        color:#22d3ee;
        font-size:14px;
        border:1px solid #22d3ee;
        padding:5px 12px;
        border-radius:20px;
        font-family: 'Times New Roman', Times, serif;
    }

    /* CONTAINER */
    .container {
        max-width:1450px;
        margin:40px auto;
        padding:0 25px;
    }

    .grid {
        display:grid;
        grid-template-columns:350px 1fr;
        gap:35px;
    }

    @media(max-width:950px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    /* GLASS CARD */
    .card {
        background:var(--card);
        backdrop-filter:blur(20px);
        border-radius:25px;
        padding:30px;
        border:1px solid var(--border);
        box-shadow: 0 20px 50px rgba(0,0,0,.4);
        transition:.4s;
    }

    .card:hover {
        transform:translateY(-8px);
        box-shadow: 0 30px 70px rgba(0,0,0,.6);
    }

    .card h2 {
        color:#67e8f9;
        margin-top:0;
        font-size:24px;
    }

    /* INPUTS */
    label {
        color:#cbd5e1;
        font-size:14px;
        letter-spacing:0.5px;
    }

    input, select {
        width:100%;
        padding:14px;
        margin:8px 0 18px;
        border-radius:12px;
        border:1px solid rgba(255,255,255,.2);
        background:rgba(255,255,255,.1);
        color:white;
        outline:none;
        font-family: 'Times New Roman', Times, serif;
        font-size:15px;
    }

    select option {
        color:black;
    }

    input:focus, select:focus {
        border-color:#22d3ee;
        box-shadow:0 0 20px rgba(34,211,238,.5);
    }

    /* BUTTON */
    .btn-primary {
        width:100%;
        padding:15px;
        border:none;
        border-radius:30px;
        color:white;
        font-size:17px;
        font-weight:bold;
        cursor:pointer;
        background: linear-gradient(90deg,#06b6d4,#a855f7);
        transition:.3s;
        font-family: 'Times New Roman', Times, serif;
    }

    .btn-primary:hover {
        transform:scale(1.05);
        box-shadow:0 0 30px #06b6d4;
    }

    .btn-primary:disabled {
        opacity:0.6;
        cursor:not-allowed;
        transform:none;
    }

    /* SEARCH */
    .search-bar input {
        background:rgba(255,255,255,.12);
    }

    /* TABLE */
    table {
        width:100%;
        border-collapse:collapse;
    }

    th {
        background:rgba(255,255,255,.1);
        padding:15px;
        color:#67e8f9;
        text-align:left;
        font-size:16px;
    }

    td {
        padding:15px;
        border-bottom:1px solid rgba(255,255,255,.1);
        color:#e2e8f0;
        font-size:15px;
    }

    tr {
        transition:.3s;
    }

    tr:hover {
        background:rgba(255,255,255,.08);
    }

    /* PDF LINK BUTTON */
    .btn-pdf {
        color:#22d3ee;
        text-decoration:none;
        font-size:14px;
        font-weight:600;
        border:1px solid #22d3ee;
        padding:5px 10px;
        border-radius:15px;
        transition:.3s;
        display:inline-block;
        font-family: 'Times New Roman', Times, serif;
    }

    .btn-pdf:hover {
        background:#22d3ee;
        color:#020617;
    }

    /* SELL BUTTON */
    .btn-sell {
        background:#10b981;
        border:none;
        padding:8px 14px;
        border-radius:20px;
        color:white;
        cursor:pointer;
        transition:.3s;
        font-family: 'Times New Roman', Times, serif;
        font-size:14px;
        margin-right:5px;
    }

    .btn-sell:hover {
        transform:scale(1.1);
        box-shadow:0 0 15px #10b981;
    }

    /* DELETE BUTTON */
    .btn-delete {
        background:#ef4444;
        border:none;
        padding:8px 14px;
        border-radius:20px;
        color:white;
        cursor:pointer;
        transition:.3s;
        font-family: 'Times New Roman', Times, serif;
        font-size:14px;
    }

    .btn-delete:hover {
        transform:scale(1.1);
        box-shadow:0 0 15px red;
    }
  </style>
</head>
<body>

  <header>
    <h1>Labaid Trading PLC <span>Inventory Management System</span></h1>
  </header>

  <div class="container">
    <div class="grid">
      
      <!-- ADD ITEM FORM -->
      <div class="card">
        <h2>Add Inventory Item</h2>
        <form id="add-form">
          <label>Category</label>
          <select id="category">
            <option value="Laboratory Equipment">Laboratory Equipment</option>
            <option value="Educational & Lab Supplies">Educational & Lab Supplies</option>
            <option value="Electrical Supplies">Electrical Supplies</option>
            <option value="Agricultural Equipment">Agricultural Equipment</option>
            <option value="Industrial Equipment">Industrial Equipment</option>
          </select>

          <label>Item Description / Name</label>
          <input type="text" id="item_name" placeholder="e.g. Water Distiller 5L/hr" required>

          <label>Brand / Manufacturer</label>
          <input type="text" id="brand" placeholder="e.g. Pyrex (or leave empty)">

          <label>Model / Specifications</label>
          <input type="text" id="model" placeholder="e.g. YZD-5 (or leave empty)">

          <label>Unit of Measure</label>
          <input type="text" id="unit_of_measure" placeholder="e.g. Pcs, Box, Pack">

          <label>Quantity</label>
          <input type="number" id="quantity" placeholder="0" required>

          <!-- PRICE INPUT -->
          <label>Unit Price (ETB)</label>
          <input type="number" id="price" step="0.01" placeholder="e.g. 15000.00 (or leave empty)">

          <!-- TECHNICAL SHEET PDF INPUT -->
          <label>Technical Sheet / Specification (PDF)</label>
          <input type="file" id="pdf_file" accept="application/pdf">

          <button type="submit" id="submit-btn" class="btn-primary">Save to Inventory</button>
        </form>
      </div>

      <!-- INVENTORY DISPLAY TABLE -->
      <div class="card">
        <h2>Current Stock Directory</h2>
        
        <div class="search-bar">
          <input type="text" id="search" placeholder="🔍 Search items, models, or brands..." onkeyup="filterItems()">
        </div>

        <table>
          <thead>
            <tr>
              <th>Item Name</th>
              <th>Category</th>
              <th>Brand</th>
              <th>Model</th>
              <th>Unit</th>
              <th>Qty</th>
              <th>Unit Price</th>
              <th>Spec Sheet</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="inventory-rows">
            <tr><td colspan="9">Loading records...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <script>
    // 1. SUPABASE CONFIGURATION
    const SUPABASE_URL = "https://cbmvbbfbgauqusibdnup.supabase.co";
    const SUPABASE_KEY = "sb_publishable_gq0-KFzH8Ru9-etDSZ_Cwg_pQrHCYcY";

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let allItems = [];

    // Helper function to handle empty inputs cleanly
    function cleanValue(val) {
      return (val && val.toString().trim() !== "") ? val : "None";
    }

    // Helper to format currency
    function formatPrice(val) {
      if (val === null || val === undefined || val === "" || isNaN(val)) return "N/A";
      return parseFloat(val).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " ETB";
    }

    // 2. FETCH ITEMS FROM SUPABASE
    async function loadInventory() {
      const { data, error } = await db.from('items').select('*').order('id', { ascending: false });
      
      if (error) {
        document.getElementById('inventory-rows').innerHTML = `<tr><td colspan="9">Error loading data. Verify table setup.</td></tr>`;
        console.error(error);
        return;
      }

      allItems = data;
      renderTable(allItems);
    }

    // 3. RENDER TABLE
    function renderTable(items) {
      const tbody = document.getElementById('inventory-rows');
      if (items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;">No inventory records found.</td></tr>`;
        return;
      }

      tbody.innerHTML = items.map(item => `
        <tr>
          <td><strong>${item.item_name}</strong></td>
          <td><span style="font-size:13px; color:#94a3b8;">${cleanValue(item.category)}</span></td>
          <td>${cleanValue(item.brand)}</td>
          <td>${cleanValue(item.model)}</td>
          <td>${cleanValue(item.unit_of_measure)}</td>
          <td>${item.quantity}</td>
          <td><strong style="color:#67e8f9;">${formatPrice(item.price)}</strong></td>
          <td>
            ${item.pdf_url 
              ? `<a href="${item.pdf_url}" target="_blank" class="btn-pdf">📄 View PDF</a>` 
              : `<span style="font-size:13px; color:#64748b;">N/A</span>`}
          </td>
          <td style="white-space: nowrap;">
            <button class="btn-sell" onclick="sellItem(${item.id}, ${item.quantity}, '${item.item_name.replace(/'/g, "\\'")}')">Sell</button>
            <button class="btn-delete" onclick="deleteItem(${item.id}, '${item.item_name.replace(/'/g, "\\'")}', '${item.pdf_url || ''}')">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    // 4. SELL / REDUCE QUANTITY FUNCTION
    async function sellItem(id, currentQty, name) {
      if (currentQty <= 0) {
        alert(`"${name}" is currently out of stock.`);
        return;
      }

      const soldQtyInput = prompt(`How many units of "${name}" were sold?`, "1");
      if (soldQtyInput === null) return; // User cancelled

      const soldQty = parseInt(soldQtyInput, 10);
      if (isNaN(soldQty) || soldQty <= 0) {
        alert("Please enter a valid number greater than 0.");
        return;
      }

      if (soldQty > currentQty) {
        alert(`Cannot sell ${soldQty} units. Only ${currentQty} currently in stock.`);
        return;
      }

      const newQty = currentQty - soldQty;

      const { error } = await db.from('items').update({ quantity: newQty }).eq('id', id);

      if (error) {
        alert("Could not update quantity: " + error.message);
      } else {
        loadInventory();
      }
    }

    // 5. SEARCH / FILTER FUNCTION
    function filterItems() {
      const query = document.getElementById('search').value.toLowerCase();
      const filtered = allItems.filter(i => 
        i.item_name.toLowerCase().includes(query) ||
        (i.brand && i.brand.toLowerCase().includes(query)) ||
        (i.model && i.model.toLowerCase().includes(query))
      );
      renderTable(filtered);
    }

    // 6. ADD ITEM & UPLOAD PDF
    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerText = "Saving & Uploading...";

      const pdfInput = document.getElementById('pdf_file');
      let pdf_url = null;

      if (pdfInput.files.length > 0) {
        const file = pdfInput.files[0];
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
        const filePath = `specs/${fileName}`;

        const { data: uploadData, error: uploadError } = await db.storage
          .from('item-docs')
          .upload(filePath, file);

        if (uploadError) {
          alert("PDF Upload failed: " + uploadError.message);
          submitBtn.disabled = false;
          submitBtn.innerText = "Save to Inventory";
          return;
        }

        const { data: publicUrlData } = db.storage
          .from('item-docs')
          .getPublicUrl(filePath);

        pdf_url = publicUrlData.publicUrl;
      }

      const rawPrice = document.getElementById('price').value;

      const newItem = {
        category: document.getElementById('category').value,
        item_name: document.getElementById('item_name').value,
        brand: cleanValue(document.getElementById('brand').value),
        model: cleanValue(document.getElementById('model').value),
        unit_of_measure: cleanValue(document.getElementById('unit_of_measure').value),
        quantity: parseInt(document.getElementById('quantity').value) || 0,
        price: rawPrice !== "" ? parseFloat(rawPrice) : null,
        pdf_url: pdf_url
      };

      const { error } = await db.from('items').insert([newItem]);

      submitBtn.disabled = false;
      submitBtn.innerText = "Save to Inventory";

      if (error) {
        alert("Database error: " + error.message);
      } else {
        document.getElementById('add-form').reset();
        loadInventory();
      }
    });

    // 7. DELETE ITEM & OPTIONALLY ITS PDF
    async function deleteItem(id, name, pdfUrl) {
      if (confirm(`Remove "${name}" from inventory?`)) {
        
        if (pdfUrl) {
          try {
            const urlParts = pdfUrl.split('/item-docs/');
            if (urlParts.length > 1) {
              const filePath = urlParts[1];
              await db.storage.from('item-docs').remove([filePath]);
            }
          } catch (err) {
            console.error("Failed to delete PDF file from storage", err);
          }
        }

        const { error } = await db.from('items').delete().eq('id', id);

        if (error) {
          alert("Could not delete item: " + error.message);
        } else {
          loadInventory();
        }
      }
    }

    // Initial load
    loadInventory();
  </script>
</body>
</html>
